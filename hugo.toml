baseURL = "https://hermanfreiman.org/"
languageCode = "en-us"
title = "Herman (Zvi) Freiman"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false

[params]
  description = "Genealogical research documenting the life of Herman Zvi Freiman, My Grandfather, Polish Jewish Holocaust survivor from Boryslaw"
  author = "Freiman Family Research"
  defaultTheme = "light"
  disableThemeToggle = true
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = false
  hideSummary = true
  disableScrollToTop = false

  [params.homeInfoParams]
    Title = "Herman (Zvi) Freiman / הרמן צבי פריימן"
    Content = "Genealogical and historical research documenting the life of a Polish Jewish Holocaust survivor from Boryslaw, Galicia. Compiled from Arolsen Archives, Yad Vashem, and personal family photographs."

  [params.cover]
    linkFullImages = true
    responsiveImages = true

[menu]

  [[menu.main]]
    identifier = "biography"
    name = "Biography"
    url = "/biography/"
    weight = 10

  [[menu.main]]
    identifier = "timeline"
    name = "Timeline"
    url = "/timeline/"
    weight = 20

  [[menu.main]]
    identifier = "family"
    name = "Family Tree"
    url = "/family/"
    weight = 30

  [[menu.main]]
    identifier = "gallery"
    name = "Gallery"
    url = "/gallery/"
    weight = 40

  [[menu.main]]
    identifier = "documents"
    name = "Documents"
    url = "/documents/"
    weight = 50

  [[menu.main]]
    identifier = "history"
    name = "History"
    url = "/history/"
    weight = 60

  [[menu.main]]
    identifier = "research"
    name = "Research Notes"
    url = "/research/"
    weight = 70

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true   # allows raw HTML in markdown (needed for RTL Hebrew spans)
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
